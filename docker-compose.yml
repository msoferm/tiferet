services:
  database:
    image: postgres:15-alpine
    container_name: tiferet_db
    environment:
      POSTGRES_DB: tiferet
      POSTGRES_USER: tiferet_user
      POSTGRES_PASSWORD: tiferet_secret_2024
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiferet_user -d tiferet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tiferet_backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: tiferet
      DB_USER: tiferet_user
      DB_PASSWORD: tiferet_secret_2024
      JWT_SECRET: tiferet_jwt_secret_2024
      CORS_ORIGIN: http://localhost:3002
    ports:
      - "5002:5000"
    volumes:
      - ./backend/src:/app/src
    command: npx nodemon src/server.js

  frontend:
    build: ./frontend
    container_name: tiferet_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5002/api
    ports:
      - "3002:3000"
    volumes:
      - ./frontend/src:/app/src
    command: npm start

volumes:
  pg_data:
